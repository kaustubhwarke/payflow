spring:
  application:
    name: payflow-api

  datasource:
    url: ${PAYFLOW_DB_URL:jdbc:mysql://localhost:3306/payflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${PAYFLOW_DB_USER:payflow}
    password: ${PAYFLOW_DB_PASSWORD:payflow}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP connection pool tuned for high-traffic scenarios (mentor feedback 22.f)
    hikari:
      pool-name: payflow-hikari
      maximum-pool-size: ${PAYFLOW_DB_POOL_MAX:20}
      minimum-idle: ${PAYFLOW_DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate          # schema is owned by Flyway, never by Hibernate
    properties:
      hibernate:
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        format_sql: false
    show-sql: false               # SQL is emitted via structured logging, not stdout

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${PAYFLOW_RABBIT_HOST:localhost}
    port: ${PAYFLOW_RABBIT_PORT:5672}
    username: ${PAYFLOW_RABBIT_USER:payflow}
    password: ${PAYFLOW_RABBIT_PASSWORD:payflow}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 3
          multiplier: 2.0

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=300s,recordStats

  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak realm issuer; validated against the realm JWKS endpoint.
          issuer-uri: ${PAYFLOW_OAUTH_ISSUER_URI:http://localhost:8081/realms/payflow}

server:
  port: ${PAYFLOW_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
  forward-headers-strategy: framework

# Application-specific configuration (bound to typed @ConfigurationProperties)
payflow:
  rate-limit:
    enabled: true
    capacity: 100              # tokens per refill window
    refill-period-seconds: 60  # window length
  tracing:
    trace-id-length: 32        # 32 hex chars (W3C / OpenTelemetry standard, 128-bit)
    span-id-length: 16         # 16 hex chars (64-bit)
  security:
    cors-allowed-origins: ${PAYFLOW_CORS_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: payflow-api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: INFO
    com.payflow: ${PAYFLOW_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${PAYFLOW_SQL_LOG_LEVEL:WARN}
