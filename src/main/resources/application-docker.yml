# Profile activated when PayFlow itself runs inside docker-compose.
# Hostnames resolve to compose service names instead of localhost.
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/payflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
  rabbitmq:
    host: rabbitmq
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/payflow
